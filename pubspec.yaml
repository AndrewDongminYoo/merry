name: derry
description: A script manager to help you define script shortcuts and use them effortlessly, and performantly.
version: 1.5.0
repository: https://github.com/frencojobs/derry

environment:
  sdk: ">=2.18.0 <3.0.0"

executables:
  derry:

dependencies:
  args: ^2.7.0
  collection: ^1.19.1
  console: ^4.1.0
  equatable: ^2.0.8
  ffi: ^2.2.0
  path: ^1.9.1
  string_similarity: ^2.1.1
  tint: ^2.0.1
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.13.1
  build_version: ^2.1.3
  lint: ^2.8.0
  mockito: ^5.6.4
  test: ^1.31.0

scripts: derry.yaml
