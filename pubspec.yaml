name: merry
description: A script manager for Dart/Flutter — define script shortcuts in pubspec.yaml and run them with a single command.
version: 2.1.0
repository: https://github.com/AndrewDongminYoo/merry
issue_tracker: https://github.com/AndrewDongminYoo/merry/issues

environment:
  sdk: ">=3.10.4 <4.0.0"

executables:
  merry:

dependencies:
  args: ^2.7.0
  collection: ^1.19.1
  console: ^4.1.0
  equatable: ^2.0.8
  ffi: ^2.2.0
  path: ^1.9.1
  string_similarity: ^2.1.1
  tint: ^2.0.1
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.13.1
  build_version: ^2.1.3
  mockito: ^5.6.4
  test: ^1.31.0

scripts: merry.yaml
